<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计查询 - 校园二手交易平台</title>
    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net/npm" crossorigin>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin></script>
</head>
<body>
<div class="container-fluid px-0">

    <!-- 头部 -->
    <div class="site-header">
        <h1>🏪 校园二手交易平台</h1>
        <p>让闲置物品焕发新生命</p>
        <div class="identity-box">
            <span class="identity-label">当前身份</span>
            <select id="identitySelect" class="identity-select" onchange="switchIdentity(this.value)">
                <option value="admin">👑 管理员</option>
                <option value="u001">👤 u001</option>
                <option value="u002">👤 u002</option>
                <option value="u003">👤 u003</option>
                <option value="u004">👤 u004</option>
            </select>
        </div>
    </div>

    <!-- 导航 -->
    <nav class="site-nav">
        <a href="index.html"  class="nav-link">首页</a>
        <a href="item.html"   class="nav-link">商品列表</a>
        <a href="user.html"   class="nav-link">用户列表</a>
        <a href="order.html"  class="nav-link">订单列表</a>
        <a href="query.html"  class="nav-link active">统计查询</a>
    </nav>

    <!-- 消息提示 -->
    <div id="message"></div>

    <div class="site-content">
        <!-- 页头 -->
        <div class="page-header">
            <h2>📊 统计查询</h2>
        </div>

        <!-- 两栏布局：左侧操作区 + 右侧结果区 -->
        <div class="row g-3 mt-1">

            <!-- 左侧：按钮卡片 -->
            <div class="col-12 col-lg-3">

                <!-- 聚合查询卡片 -->
                <div class="query-panel-card mb-3">
                    <div class="query-panel-title">
                        <span>🔢 聚合查询</span>
                        <small class="text-muted">COUNT / GROUP BY / AVG</small>
                    </div>
                    <div class="d-grid gap-2 mt-2">
                        <button class="btn btn-outline-primary btn-sm qbtn" onclick="queryCountItems()">
                            <span class="qbtn-icon">📦</span>
                            COUNT — 商品总数
                        </button>
                        <button class="btn btn-outline-primary btn-sm qbtn" onclick="queryGroupByCategory()">
                            <span class="qbtn-icon">🗂</span>
                            GROUP BY — 各类数量
                        </button>
                        <button class="btn btn-outline-primary btn-sm qbtn" onclick="queryAvgPrice()">
                            <span class="qbtn-icon">💰</span>
                            AVG — 平均价格
                        </button>
                        <button class="btn btn-outline-primary btn-sm qbtn" onclick="queryTopSeller()">
                            <span class="qbtn-icon">🏆</span>
                            发布最多的用户
                        </button>
                    </div>
                </div>

                <!-- 视图查询卡片 -->
                <div class="query-panel-card">
                    <div class="query-panel-title">
                        <span>👁 视图查询</span>
                        <small class="text-muted">已售 / 未售</small>
                    </div>
                    <div class="d-grid gap-2 mt-2">
                        <button class="btn btn-outline-success btn-sm qbtn" onclick="queryViewSoldItemsFull()">
                            <span class="qbtn-icon">✅</span>
                            已售商品视图
                        </button>
                        <button class="btn btn-outline-secondary btn-sm qbtn" onclick="queryViewUnsoldItemsFull()">
                            <span class="qbtn-icon">🟢</span>
                            未售商品视图
                        </button>
                    </div>
                </div>

            </div>

            <!-- 右侧：结果展示 -->
            <div class="col-12 col-lg-9">
                <div class="query-result-card">
                    <div id="queryTip" class="query-result-tip">
                        <span class="tip-icon">👈</span>
                        <span>点击左侧按钮执行查询，结果将展示在此处</span>
                    </div>
                    <div id="queryResult"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script defer src="js/supabase.js"></script>
<script defer src="app.js?v=9"></script>
</body>
</html>
